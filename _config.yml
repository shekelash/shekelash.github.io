title: S
url: https://shekelash.github.io
baseurl: ""

remote_theme: https://github.com/wu-kan/jekyll-theme-WuK@4.2.0

plugins:
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-remote-theme

readme_index:
  with_frontmatter: true

markdown: kramdown

defaults:
  - scope:
      path: ""
    values:
      jekyll-theme-WuK:
        default:
          body:
            theme-base: theme-base-07
          append_to_head:
            - <meta charset="utf-8" />
            - <meta name="viewport" content="width=device-width,initial-scale=1" />
            - |
              <style>
                .theme-base-07 {
                  --theme-base-color: DarkSlateBlue;
                }
              </style>
            # 添加 Font Awesome 图标库，用于显示 GitHub 等图标
            - <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.2.1/css/all.min.css" />
        home: # 展示页的配置可跳过，详见<https://revealjs.com/>
          append_to_section_tag:
            - key: data-markdown
            - key: data-separator
              value: <!-- .slide -->
            - key: data-separator-vertical
              value: <!-- .slide vertical=true -->
            - key: data-background-color
              value: "White"
          prepend: |
            <link
              rel="stylesheet"
              href="https://cdn.jsdelivr.net/combine/npm/reveal.js@4.4.0/dist/reveal.min.css,npm/reveal.js@4.4.0/dist/theme/serif.min.css"
            />
            <style>
              .reveal .slides {
                text-align: left;
              }
              .reveal a,
              .reveal a:hover,
              .reveal a:focus {
                color: inherit;
                border-bottom: 1px solid var(--theme-base-color);
              }
            </style>
          append: |
            <script
              async="async"
              src="https://cdn.jsdelivr.net/combine/npm/reveal.js@4.4.0/dist/reveal.min.js,npm/reveal.js@4.4.0/plugin/markdown/markdown.min.js,npm/reveal.js@4.4.0/plugin/math/math.min.js"
              onload="
              for(let x of document.getElementsByClassName('wrap'))
                x.classList.add('reveal');
              Reveal.initialize({
                height: '100%',
                mouseWheel: true,
                navigationMode: 'linear',
                plugins: [ RevealMarkdown, RevealMath.KaTeX ]
              });
            "></script>
